<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghina's Eternal Garden</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #020202; overflow: hidden; font-family: 'Playfair Display', serif; }
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            pointer-events: none; padding: 40px;
        }
        .instruction { color: rgba(255,192,203,0.6); letter-spacing: 3px; text-transform: uppercase; font-size: 0.8rem; }
        #ghina-text { font-size: 5rem; color: white; text-shadow: 0 0 30px #ff69b4; opacity: 0; }
    </style>
</head>
<body>

    <div class="ui-layer">
        <div class="instruction">Move to plant flowers in our garden</div>
        <div id="ghina-text" class="text-center self-center">GHINA</div>
        <div class="instruction text-right">Every spark is a moment with you</div>
    </div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Create a "Flower" (A pretty 3D Diamond/Crystal shape)
        const geometry = new THREE.OctahedronGeometry(0.1, 0);
        const material = new THREE.MeshPhongMaterial({ 
            color: 0xff69b4, 
            emissive: 0xff1493,
            shininess: 100,
            transparent: true,
            opacity: 0.8
        });

        const flowers = [];
        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x202020));

        camera.position.z = 5;

        // Interaction Logic
        window.addEventListener('mousemove', (event) => {
            // Convert mouse to 3D space
            const x = (event.clientX / window.innerWidth) * 2 - 1;
            const y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            const vector = new THREE.Vector3(x, y, 0.5);
            vector.unproject(camera);
            const dir = vector.sub(camera.position).normalize();
            const distance = -camera.position.z / dir.z;
            const pos = camera.position.clone().add(dir.multiplyScalar(distance));

            // Create a new "flower" at mouse position
            const flower = new THREE.Mesh(geometry, material.clone());
            flower.position.copy(pos);
            flower.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
            
            // Random color shift (Pink to Gold)
            if(Math.random() > 0.5) flower.material.color.setHex(0xffd700);
            
            scene.add(flower);
            flowers.push({
                mesh: flower,
                velocity: new THREE.Vector3((Math.random()-0.5)*0.01, (Math.random()-0.5)*0.01, (Math.random()-0.5)*0.01),
                rotationSpeed: Math.random() * 0.02
            });

            // Keep only the last 200 flowers for performance
            if(flowers.length > 200) {
                const old = flowers.shift();
                scene.remove(old.mesh);
            }
        });

        // Intro Animation
        gsap.to("#ghina-text", { opacity: 1, duration: 3, delay: 1, ease: "power2.inOut" });

        function animate() {
            requestAnimationFrame(animate);
            
            flowers.forEach(f => {
                f.mesh.position.add(f.velocity);
                f.mesh.rotation.y += f.rotationSpeed;
                f.mesh.rotation.x += f.rotationSpeed;
            });

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
